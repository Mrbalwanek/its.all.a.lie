function component(width, height, color, x, y, type) {
    this.type = type;
    
    if (type == "zdjecie") {
        this.image = new Image();
        this.image.src = color;
    }
    this.text = color;
    this.color = color;
    this.score = 0;
    this.width = width;
    this.height = height;
    this.speedX = 0;
    this.speedY = 0;    
    this.x = x;
    this.y = y;
    this.gravity = 0;
    this.gravitySpeed = 0;
    this.update = function() {
        ctx = myGameArea.context;
        
        if (this.type == "text") {
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = this.color;
            ctx.fillText(this.text, this.x, this.y);
        } else if (this.type == "zdjecie") {
            ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
        }else {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
    
    this.newPos = function() {
        this.gravitySpeed += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY + this.gravitySpeed;
        this.hitBottom();
        this.hitUp();
        this.hitLeft();
        this.hitRight(); 
    }

    this.hitBottom = function() {
        var rockbottom = myGameArea.canvas.height - this.height;
        if (this.y > rockbottom) {
            this.y = rockbottom;
            this.gravitySpeed = 0;
        }
    }
    
    this.hitUp = function() {
        var rockup = this.height - 30;
        if (this.y < rockup) {
            this.y = rockup;
            this.gravitySpeed = 0;
        }
    }

    this.hitLeft = function() {
        var rockleft = this.width - 30;
        if (this.x < rockleft) {
            this.x = rockleft;
            this.gravitySpeed = 0;
        }
    }

    this.hitRight = function() {
        var rockright = 470;
        if (this.x > rockright ){
            this.x = rockright;
            this.gravitySpeed = 0;
        }
    }
    
    this.crashWith = function(otherobj) {
        var myleft = this.x;
        var myright = this.x + (this.width);
        var mytop = this.y;
        var mybottom = this.y + (this.height);
        var otherleft = otherobj.x;
        var otherright = otherobj.x + (otherobj.width);
        var othertop = otherobj.y;
        var otherbottom = otherobj.y + (otherobj.height);
        var crash = true;
        
        if ((mybottom < othertop) || (mytop > otherbottom) || (myright < otherleft) || (myleft > otherright)) {
            crash = false;
        }
        return crash;
    }
}

                }
                myGamePiece.x += 300;
                crashed.play();

        if(bosshp == 1 && everyinterval(120)){

            let aa1 = new component(15, 15, "red", kX, -200); //gora

    for (i = 0; i < attacks.length; i++) {
        attacks[i].x += attacks[i].speedX;
        attacks[i].y += attacks[i].speedY;

            myhploss.currentTime = 0;
            myhploss.play();
            hp -= 1;
            hitTimer = 50;
            document.getElementById("red").style.display = "block";
            myGamePiece.speedX = 0;
            myGamePiece.speedY = 0;
            myGamePiece.gravitySpeed = 0;
            attacks.splice(i, 1);
            i--;
        }
        if (attacks[i].x < -300 || attacks[i].x > myGameArea.canvas.width + 300 || attacks[i].y < -300 || attacks[i].y > myGameArea.canvas.height + 300){
            attacks.splice(i, 1);
            i--;
    }
    }

    for (i = 0; i < bones.length; i++) {

            bones.splice(i, 1);

            bones.splice(i, 1);
            i--;

            i--;

        return;

    if(hp == 3){

        document.getElementById("II").style.filter = "none";
        document.getElementById("III").style.filter = "none";
    } else if(hp == 2){

        document.getElementById("II").style.filter = "none";
        document.getElementById("III").style.filter = "brightness(10%)";

            document.getElementById("II").style.filter = "brightness(10%)";
            document.getElementById("III").style.filter = "brightness(10%)";

    } else if(hp <= 0){

        document.getElementById("II").style.filter = "brightness(10%)";
        document.getElementById("III").style.filter = "brightness(10%)";

        let waity = false;
        if(death == 0){

            died.play();
            document.getElementById("dedscreen").style.display = "block";

            waity = true;
        }

            startGame();
            return;

            death = 0;
            reset = true;
            startGame();
            return;
        } else{
            document.getElementById("dedscreen").style.display = "block";
            final.pause();
            died.play();
            return;
        }
    }
    if(hitTimer > 0){

    }if(hitTimer <= 0){
        document.getElementById("red").style.display = "none";
    }

    myScore.update();
    myGamePiece.newPos();
    myGamePiece.update();
}

function everyinterval(n) {
    if ((myGameArea.frameNo / n) % 1 == 0) {
        return true;
    }
    return false;
}

function minusbosshp(){
    let decision = Math.floor(Math.random() * 2);
    var rwidth;
    if(decision == 0){
        rwidth = Math.floor(Math.random() * 15) + 10;
    } else{
        rwidth = Math.floor(Math.random() * 15) + 75;
    }
    let rheight = Math.floor(Math.random() * 40) + 30;
    killingboss.style.left = rwidth + "%";
    killingboss.style.top = rheight + "%";
    bosshp -= 1;
    hploss.currentTime = 0;
    hploss.play();
    document.getElementById("killingboss").style.display = "none";
    if(everyinterval(150) && appear == false){
        document.getElementById("killingboss").style.display = "none";
        appear = true;
        hpplay = false;
    }
}

function accelerate(n) {
    chill.play();
    if(reset == false){
        kliks += 1;
    }
    document.getElementById("di").innerHTML = "Liczba kliknięć: " + kliks;
    let znak = false; 
    if(myGamePiece.gravity > 1){ 
        myGamePiece.gravity = n;
    } else{
        myGamePiece.gravity = 6;
    }
    if(reset == true){
        kliks += 0;
    }
    if(myGameArea.frameNo >= 10000 && its_all_a_lie < 90000){
        document.getElementById("di").innerHTML = "ERROR: " + kliks;
        document.getElementById("gam").innerHTML = "ERROR";
    }
    if(its_all_a_lie >= 89000){
        myObstacles = [];
        myGameArea.clear();
    }    
    if(znak == true){
        myObstacles = [];
        myGameArea.clear();
    }
}

window.addEventListener('keydown', function (klik){
    keys[klik.keyCode] = true;
    if (klik.keyCode == 32) { 
        klik.preventDefault();
    }
    if (its_all_a_lie < 90000) {
        if (klik.keyCode == 32) {
            accelerate(-6);
        }
    }
    }
);

window.addEventListener('keyup', function (klik){
    keys[klik.keyCode] = false;
});
